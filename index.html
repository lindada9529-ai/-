<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSO 测试页面</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        h1 { margin: 0 0 10px; color: #333; }
        p { color: #666; margin-bottom: 30px; }
        .login-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 14px 30px;
            font-size: 16px;
            border-radius: 40px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
        }
        .user-info {
            background: #f5f5f5;
            border-radius: 16px;
            padding: 20px;
            margin: 20px 0;
            text-align: left;
        }
        .logout-btn {
            background: #dc3545;
            border: none;
            color: white;
            padding: 12px;
            border-radius: 40px;
            cursor: pointer;
            width: 100%;
        }
        .error { color: #dc3545; background: #ffe6e6; padding: 12px; border-radius: 12px; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔐 SSO 测试</h1>
        <p>好未来统一登录测试</p>
        <div id="loginPanel">
            <button class="login-btn" onclick="login()">造物神登录</button>
        </div>
        <div id="userPanel" style="display:none;">
            <div class="user-info">
                <strong>👤 用户信息</strong>
                <pre id="userInfo" style="margin-top:10px;font-size:12px;overflow:auto"></pre>
            </div>
            <button class="logout-btn" onclick="logout()">退出登录</button>
        </div>
        <div id="errorMsg"></div>
    </div>

    <script>
        const API_BASE = 'https://sso-calk-server-ptfnvdwoua.cn-beijing.fcapp.run';
        const APP_ID = '1776997362';
        const LOGIN_URL = 'https://service.100tal.com/new/sso/login';
        const LOGOUT_URL = 'https://service.100tal.com/new/sso/logout';

        function getCode() {
            const params = new URLSearchParams(window.location.search);
            return params.get('code');
        }

        function login() {
            const redirectUri = window.location.href.split('?')[0];
            window.location.href = `${LOGIN_URL}?appId=${APP_ID}&redirect_uri=${encodeURIComponent(redirectUri)}`;
        }

        async function logout() {
            try {
                await fetch(`${API_BASE}/api/sso/logout`, { method: 'POST' });
            } catch(e) {}
            localStorage.removeItem('user');
            window.location.href = `${LOGOUT_URL}?appId=${APP_ID}`;
        }

        function showUser(data) {
            document.getElementById('loginPanel').style.display = 'none';
            document.getElementById('userPanel').style.display = 'block';
            document.getElementById('userInfo').textContent = JSON.stringify(data, null, 2);
        }

        function showError(msg) {
            document.getElementById('errorMsg').innerHTML = `<div class="error">❌ ${msg}</div>`;
        }

        async function handleCallback() {
            const code = getCode();
            if (!code) return;

            document.getElementById('loginPanel').innerHTML = '<button class="login-btn" disabled>登录中...</button>';

            try {
                const res = await fetch(`${API_BASE}/api/sso/token`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: code })
                });
                const result = await res.json();
                
                if (result.success) {
                    localStorage.setItem('user', JSON.stringify(result.data));
                    window.history.replaceState({}, document.title, window.location.pathname);
                    showUser(result.data);
                } else {
                    showError('登录失败: ' + (result.message || '未知错误'));
                    document.getElementById('loginPanel').innerHTML = '<button class="login-btn" onclick="login()">重新登录</button>';
                }
            } catch (err) {
                showError('网络错误: ' + err.message);
                document.getElementById('loginPanel').innerHTML = '<button class="login-btn" onclick="login()">重新登录</button>';
            }
        }

        const saved = localStorage.getItem('user');
        if (saved) {
            try {
                showUser(JSON.parse(saved));
            } catch(e) {
                handleCallback();
            }
        } else {
            handleCallback();
        }
    </script>
</body>
</html>
