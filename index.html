<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSO 测试页面</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        h1 { margin: 0 0 10px; color: #333; }
        p { color: #666; margin-bottom: 30px; }
        .login-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 14px 30px;
            font-size: 16px;
            border-radius: 40px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
        }
        .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .user-info {
            background: #f5f5f5;
            border-radius: 16px;
            padding: 20px;
            margin: 20px 0;
            text-align: left;
        }
        .logout-btn {
            background: #dc3545;
            border: none;
            color: white;
            padding: 12px;
            border-radius: 40px;
            cursor: pointer;
            width: 100%;
        }
        .error { color: #dc3545; background: #ffe6e6; padding: 12px; border-radius: 12px; margin-top: 15px; }
        pre { font-size: 12px; overflow-x: auto; white-space: pre-wrap; word-break: break-all; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔐 好未来统一登录</h1>
        <p>SSO 单点登录测试</p>
        <div id="loginPanel">
            <button class="login-btn" onclick="login()">造物神登录</button>
        </div>
        <div id="userPanel" style="display:none;">
            <div class="user-info">
                <strong>👤 用户信息</strong>
                <pre id="userInfo"></pre>
            </div>
            <button class="logout-btn" onclick="logout()">退出登录</button>
        </div>
        <div id="errorMsg"></div>
    </div>

    <script>
        const API_BASE = 'https://sso-calk-server-ptfnvdwoua.cn-beijing.fcapp.run';
        const APP_ID = '1776997362';
        // 登录页面地址（文档中的格式）
        const LOGIN_URL = `https://sso.100tal.com/portal/login/${APP_ID}`;
        // 登出地址（需要把回调地址加到白名单）
        const LOGOUT_URL = 'https://sso.100tal.com/sso/logout';

        function getTokenFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return params.get('token');
        }

        // 登录：跳转到造物神登录页
        function login() {
            const redirectUri = window.location.href.split('?')[0];
            // 携带自定义参数（可选）
            const loginUrl = `${LOGIN_URL}?redirect_uri=${encodeURIComponent(redirectUri)}`;
            window.location.href = loginUrl;
        }

        // 处理回调：用 token 换取用户信息
        async function handleCallback() {
            const token = getTokenFromUrl();
            if (!token) return;

            const panel = document.getElementById('loginPanel');
            panel.innerHTML = '<button class="login-btn" disabled>验证登录中...</button>';

            try {
                const res = await fetch(`${API_BASE}/api/sso/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token })
                });
                const result = await res.json();
                
                if (result.success) {
                    localStorage.setItem('user', JSON.stringify(result.data));
                    // 清除 URL 中的 token 参数
                    window.history.replaceState({}, document.title, window.location.pathname);
                    showUser(result.data);
                } else {
                    throw new Error(result.message || '验证失败');
                }
            } catch (err) {
                showError('登录验证失败: ' + err.message);
                document.getElementById('loginPanel').innerHTML = '<button class="login-btn" onclick="login()">重新登录</button>';
            }
        }

        function showUser(data) {
            document.getElementById('loginPanel').style.display = 'none';
            document.getElementById('userPanel').style.display = 'block';
            // 美化显示用户信息
            const userInfo = {
                账号ID: data.account_id,
                账号: data.account,
                姓名: data.name,
                工号: data.workcode,
                邮箱: data.email || '未设置',
                YachId: data.yachid,
                所属账号ID: data.owner_account_id,
                所属账号: data.owner_account,
                所属姓名: data.owner_name,
                所属工号: data.owner_workcode
            };
            document.getElementById('userInfo').textContent = JSON.stringify(userInfo, null, 2);
        }

        function showError(msg) {
            document.getElementById('errorMsg').innerHTML = `<div class="error">❌ ${msg}</div>`;
        }

        // 退出登录 - 使用文档要求的 HTML 跳转方式
        function logout() {
            const redirectUri = window.location.href.split('?')[0];
            const logoutUrl = `${LOGOUT_URL}?path=${encodeURIComponent(redirectUri)}`;
            // 清除本地存储
            localStorage.removeItem('user');
            // 跳转到造物神登出页面
            window.location.href = logoutUrl;
        }

        // 检查本地存储
        const saved = localStorage.getItem('user');
        if (saved) {
            try {
                showUser(JSON.parse(saved));
            } catch(e) {
                handleCallback();
            }
        } else {
            handleCallback();
        }
    </script>
</body>
</html>
