<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSO 测试页面</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        h1 { margin: 0 0 10px; color: #333; }
        p { color: #666; margin-bottom: 30px; }
        .login-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 14px 30px;
            font-size: 16px;
            border-radius: 40px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
        }
        .user-info {
            background: #f5f5f5;
            border-radius: 16px;
            padding: 20px;
            margin: 20px 0;
            text-align: left;
        }
        .logout-btn {
            background: #dc3545;
            border: none;
            color: white;
            padding: 12px;
            border-radius: 40px;
            cursor: pointer;
            width: 100%;
        }
        .error { color: #dc3545; background: #ffe6e6; padding: 12px; border-radius: 12px; margin-top: 15px; }
        .loading { color: #667eea; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔐 SSO 测试</h1>
        <p>好未来统一登录测试</p>
        <div id="loginPanel">
            <button class="login-btn" onclick="login()">造物神登录</button>
        </div>
        <div id="userPanel" style="display:none;">
            <div class="user-info">
                <strong>👤 用户信息</strong>
                <pre id="userInfo" style="margin-top:10px;font-size:12px;overflow:auto"></pre>
            </div>
            <button class="logout-btn" onclick="logout()">退出登录</button>
        </div>
        <div id="errorMsg"></div>
    </div>

    <script>
        const API_BASE = 'https://sso-calk-server-ptfnvdwoua.cn-beijing.fcapp.run';
        
        // 从 URL 获取 token 参数（造物神回调时带的）
        function getTokenFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return params.get('token');
        }

        // 登录：先获取 ticket，再跳转
        async function login() {
            const panel = document.getElementById('loginPanel');
            panel.innerHTML = '<button class="login-btn" disabled>获取登录信息...</button>';
            
            try {
                // 1. 获取 ticket
                const ticketRes = await fetch(`${API_BASE}/api/sso/ticket`);
                const ticketData = await ticketRes.json();
                
                if (!ticketData.success) {
                    throw new Error(ticketData.message || '获取 ticket 失败');
                }
                
                // 2. 保存 ticket 到 session
                sessionStorage.setItem('ssoTicket', ticketData.ticket);
                
                // 3. 跳转到造物神登录页（需要确认正确的登录页 URL）
                // 常见格式：https://sso.100tal.com/login?ticket=xxx&redirect_uri=xxx
                const redirectUri = window.location.href.split('?')[0];
                const loginUrl = `https://sso.100tal.com/login?ticket=${ticketData.ticket}&redirect_uri=${encodeURIComponent(redirectUri)}`;
                window.location.href = loginUrl;
                
            } catch (err) {
                panel.innerHTML = `<button class="login-btn" onclick="login()">重试登录</button>`;
                showError('获取登录信息失败: ' + err.message);
            }
        }

        // 处理回调：用 token 换取用户信息
        async function handleCallback() {
            const token = getTokenFromUrl();
            if (!token) return;

            const panel = document.getElementById('loginPanel');
            panel.innerHTML = '<button class="login-btn" disabled>验证登录中...</button>';

            try {
                // 获取之前保存的 ticket
                const ticket = sessionStorage.getItem('ssoTicket');
                
                const res = await fetch(`${API_BASE}/api/sso/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token, ticket: ticket })
                });
                const result = await res.json();
                
                if (result.success) {
                    localStorage.setItem('user', JSON.stringify(result.data));
                    window.history.replaceState({}, document.title, window.location.pathname);
                    showUser(result.data);
                } else {
                    throw new Error(result.message || '验证失败');
                }
            } catch (err) {
                showError('登录验证失败: ' + err.message);
                document.getElementById('loginPanel').innerHTML = '<button class="login-btn" onclick="login()">重新登录</button>';
            }
        }

        function showUser(data) {
            document.getElementById('loginPanel').style.display = 'none';
            document.getElementById('userPanel').style.display = 'block';
            document.getElementById('userInfo').textContent = JSON.stringify(data, null, 2);
        }

        function showError(msg) {
            document.getElementById('errorMsg').innerHTML = `<div class="error">❌ ${msg}</div>`;
        }

        async function logout() {
            localStorage.removeItem('user');
            sessionStorage.removeItem('ssoTicket');
            window.location.href = window.location.href.split('?')[0];
        }

        // 检查是否已登录
        const saved = localStorage.getItem('user');
        if (saved) {
            try {
                showUser(JSON.parse(saved));
            } catch(e) {
                handleCallback();
            }
        } else {
            handleCallback();
        }
    </script>
</body>
</html>
